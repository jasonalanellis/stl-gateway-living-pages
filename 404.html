  <style>
    /* ============================
       CSS Custom Properties
       ============================ */
    :root {
      --color-primary:    #1E3A5F;  /* Gateway Blue */
      --color-secondary:  #C0A062;  /* Arch Gold */
      --color-accent:     #E85D04;  /* Cardinals Red */
      --color-bg:         #FAFAFA;
      --color-surface:    #FFFFFF;
      --color-text:       #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border:     #E5E7EB;
      --font-heading:     'Montserrat', sans-serif;
      --font-body:        'Open Sans', sans-serif;
      --font-accent:      'Playfair Display', serif;
      --max-width:        860px;
      --radius:           8px;
    }

    /* ============================
       Reset + Base
       ============================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      line-height: 1.7;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { color: var(--color-primary); }
    a:hover { color: var(--color-accent); }

    /* ============================
       Header / Nav
       ============================ */
    .site-header {
      background: var(--color-primary);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .site-header .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .site-header .logo-img {
      height: 40px;
      width: auto;
    }
    .site-header .brand-name {
      color: var(--color-secondary);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }
    .site-header .tagline {
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      font-family: var(--font-body);
      display: none;
    }
    @media (min-width: 600px) {
      .site-header .tagline { display: block; }
    }
    .site-header .header-cta a {
      background: var(--color-secondary);
      color: var(--color-primary);
      text-decoration: none;
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .site-header .header-cta a:hover { background: #d4b575; }

    /* ============================
       Page wrapper
       ============================ */
    .page-wrapper {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    /* ============================
       Article meta line
       ============================ */
    .article-meta {
      font-size: 0.82rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .article-meta .date::before { content: "📅 "; }
    .article-meta .read-time::before { content: "⏱ "; }

    /* ============================
       Content typography
       ============================ */
    .article-content h1 {
      font-family: var(--font-accent);
      font-size: 2rem;
      line-height: 1.25;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
    }
    .article-content h2 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-primary);
      margin: 2.5rem 0 0.75rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--color-secondary);
    }
    .article-content h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--color-primary);
      margin: 1.75rem 0 0.5rem;
    }
    .article-content h4 {
      font-family: var(--font-heading);
      font-weight: 600;
      font-size: 1rem;
      margin: 1.25rem 0 0.4rem;
    }
    .article-content p { margin-bottom: 1rem; }
    .article-content ul, .article-content ol {
      margin: 0.75rem 0 1rem 1.5rem;
    }
    .article-content li { margin-bottom: 0.35rem; }
    .article-content strong { font-weight: 600; color: var(--color-text); }
    .article-content em { font-style: italic; color: var(--color-text-muted); }
    .article-content hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 2rem 0;
    }
    .article-content blockquote {
      border-left: 4px solid var(--color-secondary);
      padding: 0.75rem 1rem;
      margin: 1.5rem 0;
      background: #F9F5EC;
      border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic;
    }
    .article-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    .article-content th {
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-heading);
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      text-align: left;
    }
    .article-content td {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid var(--color-border);
    }
    .article-content tr:nth-child(even) td { background: #F3F4F6; }
    .article-content a { text-decoration: underline; }

    /* ============================
       Index page listing
       ============================ */
    .page-listing { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem; }
    .page-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: box-shadow 0.2s;
    }
    .page-card:hover { box-shadow: 0 4px 12px rgba(30,58,95,0.12); }
    .page-card h2 { font-size: 1.15rem; margin-bottom: 0.5rem; border: none; padding: 0; }
    .page-card h2 a { text-decoration: none; }
    .page-card h2 a:hover { text-decoration: underline; }
    .page-card .snippet { font-size: 0.9rem; color: var(--color-text-muted); margin-bottom: 0.75rem; }
    .page-card .read-more { font-size: 0.85rem; font-weight: 600; color: var(--color-accent); text-decoration: none; }
    .page-card .read-more:hover { text-decoration: underline; }

    /* ============================
       Featured Provider CTA aside
       ============================ */
    .featured-provider {
      background: linear-gradient(135deg, var(--color-primary) 0%, #2a4f82 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 1.75rem 1.5rem;
      margin: 3rem 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .featured-provider .fp-label {
      font-family: var(--font-heading);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;

      color: var(--color-secondary);
    }
    .featured-provider .fp-title {

      font-size: 1.4rem;
      line-height: 1.3;
    }

      display: inline-block;

      color: var(--color-primary);
      font-family: var(--font-heading);

      font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
      border-radius: 4px;
      text-decoration: none;

    /* ============================

    .site-footer {

      padding: 2rem 1.25rem;

      font-size: 0.85rem;

    .site-footer .footer-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: space-between;
      align-items: flex-start;
    }
    .site-footer .footer-brand {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1rem;
      color: var(--color-secondary);
      margin-bottom: 0.4rem;
    }
    .site-footer a { color: var(--color-secondary); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
    .site-footer .newsletter-cta {
      font-style: italic;
      font-size: 0.82rem;
    }

    /* ============================
       Responsive
       ============================ */
    @media (max-width: 600px) {
      .article-content h1 { font-size: 1.55rem; }
      .article-content h2 { font-size: 1.2rem; }
      .page-wrapper { padding: 1.25rem 1rem; }
    }
  </style>
</head>
